---
# https://github.com/gretel/cdc-badge-esphome

substitutions:
  # Device identity
  device_name: cdc-badge
  friendly_name: CDC Badge
  project_name: "riat.at"
  project_version: "0.1.1"
  device_area: "Bootcamp"

  # Pin substitutions — change once if reusing this firmware on a different board
  pin_i2c_sda: GPIO17
  pin_i2c_scl: GPIO18
  pin_spi_clk: GPIO12
  pin_spi_mosi: GPIO13
  pin_spi_miso: GPIO11
  pin_epd_cs: GPIO41
  pin_epd_dc: GPIO45
  pin_epd_rst: GPIO46
  pin_epd_busy: GPIO42
  pin_epd_led: GPIO8
  pin_tr01_cs: GPIO10
  pin_sao_io1: GPIO15
  pin_sao_io2: GPIO16
  pin_grove_in: GPIO2
  pin_flash_btn: GPIO0
  pin_wake: GPIO1
  pin_exp_irq: GPIO1

  # Charger limits (BQ25895)
  charger_i2c_addr: 0x6A
  charger_max_ma: "1024"
  charger_voltage_mv: "4208"
  charger_input_ma: "500"
  charger_precharge_ma: "128"

  # Display
  font_large: "14"
  font_small: "12"
  display_update_default: "60"      # seconds between periodic e-paper refreshes
  display_width: "128"
  display_height: "296"
  full_update_interval: "10"         # full flash (not partial) every Nth update

  # I2C
  i2c_frequency: 100kHz

# ── Core config ─────────────────────────────────────────────────
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  project:
    name: ${project_name}
    version: ${project_version}
  min_version: 2026.5.0
  area: ${device_area}
  # Boot sequence: wait for e-paper init → start periodic refresh loop →
  # flash backlight briefly so user knows the badge is alive
  on_boot:
    then:
      - delay: 3s             # let SPI/I²C peripherals settle after power-on
      - script.execute: display_loop   # start the periodic display refresh loop
      - delay: 2s             # wait for first frame to render
      - light.turn_on:        # backlight ON for 1s to signal successful boot
          id: epd_backlight
          brightness: 1
      - delay: 1s
      - light.turn_off: epd_backlight

# ── MCU: ESP32-S3 (16 MB flash, octal PSRAM) ─────────────────────
esp32:
  board: esp32-s3-devkitc1-n16r8
  variant: ESP32S3
  flash_size: 16MB
  framework:
    type: esp-idf
    # ESP-IDF advanced tuning — these reduce binary size and free IRAM
    advanced:
      compiler_optimization: PERF
      disable_libc_locks_in_iram: true
      disable_vfs_support_dir: true
      disable_vfs_support_select: true
      disable_vfs_support_termios: true
      enable_idf_experimental_features: true
      enable_lwip_dhcp_server: true
      execute_from_psram: true

# ── PSRAM (for LVGL framebuffer + display lambda buffers) ─────
psram:
  mode: octal
  speed: 80MHz
  enable_ecc: true

# ── Custom components (bq25895 charger, tropic01 secure element) ─
external_components:
  - source:
      type: local
      path: components

# ── Logging (via USB-Serial/JTAG, reduce I²C noise) ─────────────
logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG     # USB-C data pins, no separate UART needed
  logs:
    i2c.idf: WARN                    # suppress noisy I²C driver-level logs
    epaper_spi: INFO

# ── Packages ──────────────────────────────────────────────────
packages:
  - !include packages/power.yaml
  - !include packages/network.yaml
  - !include packages/api.yaml
  - !include packages/display.yaml
  - !include packages/controls.yaml
  - !include packages/sensors.yaml
  - !include packages/tropic01.yaml
