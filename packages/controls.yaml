# ── SAO expansion port (GPIO15 = IO1, GPIO16 = IO2) ──────────
# Controlled via Home Assistant switches.  Default ON.
switch:
  - platform: gpio
    id: sao_gpio1
    name: "SAO IO1"
    pin: GPIO15
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      then:
        - lambda: "id(active_tab_idx);"  # placeholder — no-op
    on_turn_off:
      then:
        - lambda: "id(active_tab_idx);"  # placeholder — no-op
  - platform: gpio
    id: sao_gpio2
    name: "SAO IO2"
    pin: GPIO16
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      then:
        - lambda: "id(active_tab_idx);"  # placeholder — no-op
    on_turn_off:
      then:
        - lambda: "id(active_tab_idx);"  # placeholder — no-op

# ── Action buttons ────────────────────────────────────────────
button:
  # Reboot the ESP32 (soft restart, no flash erase)
  - platform: restart
    id: reboot_btn
    name: "Restart"
    icon: "mdi:restart"
    entity_category: "config"

  # Boot into safe mode (OTA-only, skip custom config)
  - platform: safe_mode
    id: safe_mode_btn
    name: "Safe Mode Boot"
    entity_category: "config"

  # Enter deep sleep: show PWR tab (sleep icon) → cut power → wake on any key press
  - platform: template
    id: sleep_btn
    name: "Deep Sleep"
    icon: "mdi:sleep"
    entity_category: "config"
    on_press:
      then:
        # 1. Switch to PWR tab — shows the sleep icon on e-paper
        - lambda: "id(active_tab_idx) = 2;"
        - lvgl.tabview.select:
            id: tabs
            index: 2
        # 2. Wait for the slow e-paper to finish its refresh cycle
        - delay: 3s
        # 3. Kill the backlight
        - light.turn_off: epd_backlight
        - delay: 200ms
        # 4. Clear any pending interrupt on the TCA9535 IO expander,
        #    otherwise the first key press after wake only clears the latch.
        - lambda: |-
            { uint8_t v; id(keypad_expander)->read_byte(0x00, &v); id(keypad_expander)->read_byte(0x01, &v); }
        # 5. Enter deep sleep — GPIO1 (EXP_IRQ) is configured as wake pin
        - deep_sleep.enter

  # Force a full e-paper refresh (clears ghosting)
  - platform: template
    id: refresh_btn
    name: "Refresh Display"
    icon: "mdi:refresh"
    entity_category: "config"
    on_press:
      then:
        - lambda: "id(badge_display)->update();"
