# ── Display Backlight (GPIO8, PWM) — off by default ───────────
output:
  - platform: ledc
    id: display_backlight
    pin: GPIO8
    frequency: 10000Hz

# Single white LED behind the e-paper, controlled via PWM brightness
light:
  - platform: monochromatic
    id: epd_backlight
    name: "Display Backlight"
    output: display_backlight
    restore_mode: RESTORE_DEFAULT_OFF   # start dark to save battery
    effects:
      - strobe:
          name: Blink
          colors:
            - state: true
              brightness: 1
              duration: 300ms
            - state: false
              duration: 300ms
      - pulse:
          name: "Slow Pulse"
          transition_length: 2s
          update_interval: 2s
          min_brightness: 0
          max_brightness: 1
      - pulse:
          name: "Fast Pulse"
          transition_length: 500ms
          update_interval: 500ms
          min_brightness: 0.2
          max_brightness: 1

# ── SPI bus (shared by e-paper + TROPIC01 secure element) ────
spi:
  - id: spi_bus
    clk_pin: GPIO12
    mosi_pin: GPIO13
    miso_pin: GPIO11

# ── E-paper display: GDEY029T94 (SSD1680, 296×128, portrait) ─
# LVGL owns the framebuffer — no lambda, no manual drawing.
# Rotation is handled by LVGL config (rotation: 90).
display:
  - platform: epaper_spi
    id: badge_display
    model: ssd1683
    dimensions:
      width: 128
      height: 296
    cs_pin: GPIO41
    dc_pin: GPIO45
    reset_pin: GPIO46
    busy_pin: GPIO42
    full_update_every: 10
    auto_clear_enabled: false
    update_interval: never
    init_sequence:
      - [0x01, 0x27, 0x01, 0x00]
      - [0x18, 0x80]
      - [0x11, 0x03]

# ── Fonts (Google Montserrat, embedded via gfonts://) ─────────
# These are used by LVGL widgets via text_font references.
# font_s (14px) — small data labels (wifi signal, percentage)
# font_m (18px) — medium labels (IP, SSID, notification)
# font_l (20px) — large notification text
font:
  - file: "gfonts://Montserrat"
    id: font_s
    size: 14
  - file: "gfonts://Montserrat"
    id: font_m
    size: 18
  - file: "gfonts://Montserrat"
    id: font_l
    size: 20
