# ── ALL sensors: text_sensor, sensor, binary_sensor ───────────
# Everything that reads or reports data lives here.
# Sensors are grouped by source: ESPHome built-ins, bq25895, template-derived.

text_sensor:
  # Firmware version (set via project_version substitution)
  - platform: version
    id: badge_version
    name: "Version"
    icon: "mdi:exponent-box"

  # WiFi connection info (populated automatically when connected)
  - platform: wifi_info
    ip_address:
      id: ip_addr
      icon: "mdi:counter"
      name: "IP Address"
      on_value:
        then:
          - lvgl.widget.refresh: ipaddress
    ssid:
      id: wifi_ssid
      name: "SSID"
      on_value:
        then:
          - lvgl.widget.refresh: ssid

  # BQ25895 charger status (verbose strings from the chip, abbreviated on screen)
  - platform: bq25895
    bq25895_id: badge_charger
    charge_status:
      id: charge_status
      name: "Charge Status"
    bus_status:
      id: usb_bus_status
      name: "USB Bus Status"

  # TROPIC01 R-Memory read result (set by the se_read API service)
  - platform: template
    id: se_r_mem_value
    name: "SE R-Memory Value"

  # Notification message — set from HA via the "notify" API service
  - platform: template
    id: notif_msg
    name: "Badge Notification"
    update_interval: never               # only changes when the API service writes it
    on_value:
      then:
        # New notification → refresh the LVGL label so it re-evaluates the lambda
        - lvgl.widget.refresh: notification

sensor:
  # ── BQ25895 charger measurements ────────────────────────────
  - platform: bq25895
    bq25895_id: badge_charger
    battery_voltage:
      id: batt_voltage
      name: "Battery Voltage"
    vbus_voltage:
      id: usb_voltage
      name: "USB Voltage"
    charge_current:
      id: charge_current
      name: "Charge Current"

  # ── Chip health ────────────────────────────────────────────
  - platform: internal_temperature
    id: core_temp
    name: "Core Temperature"
    update_interval: 60s

  - platform: uptime
    id: badge_uptime
    name: "Uptime"
    update_interval: 60s
    icon: "mdi:clock-start"

  # ── WiFi signal ────────────────────────────────────────────
  - platform: wifi_signal
    id: wifi_sig
    name: "WiFi Signal"
    update_interval: 30s
    icon: "mdi:wifi"
    on_value:
      then:
        - lvgl.widget.refresh: wifi_signal_label
        - lvgl.widget.refresh: wifi_strength_label

  # Same RSSI value but converted to a user-friendly 0-100% percentage
  - platform: copy
    id: wifi_strength
    source_id: wifi_sig
    name: "WiFi Strength"
    filters:
      # Formula: 2 × (dBm + 100), clamped to [0, 100]
      # At −100 dBm → 0%, at −50 dBm → 100%
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "%"
    entity_category: "diagnostic"

  # ── Derived battery metrics ────────────────────────────────
  # Battery Level: LiPo voltage (3.0-4.2V) mapped to 0-100%
  - platform: template
    id: battery_pct
    name: "Battery Level"
    unit_of_measurement: "%"
    update_interval: 30s
    lambda: |-
      if (!id(batt_voltage).has_state()) return NAN;
      float v = id(batt_voltage).state;
      float pct = (v - 3.0) / 1.2 * 100.0;
      if (pct < 0) pct = 0;
      if (pct > 100) pct = 100;
      return pct;
    icon: "mdi:battery"
    on_value:
      then:
        - lvgl.bar.update:
            id: battery_percentage
            value: !lambda return (int)x;

  # Estimated remaining hours (rough): capacity × voltage fraction ÷ avg draw
  - platform: template
    id: battery_runtime
    name: "Battery Runtime"
    unit_of_measurement: "h"
    update_interval: 60s
    lambda: |-
      if (!id(batt_voltage).has_state()) return NAN;
      float v = id(batt_voltage).state;
      float pct = (v - 3.0) / 1.2;
      if (pct < 0) pct = 0;
      if (pct > 1) pct = 1;
      return pct * 1200.0 / 200.0;
    icon: "mdi:battery-clock"

binary_sensor:
  # HA connectivity (COM vs DISCONNECTED)
  - platform: status
    name: "Status"

  # USB cable presence (from BQ25895 VBUS detection)
  - platform: bq25895
    bq25895_id: badge_charger
    vbus_connected:
      id: charger_vbus

  # ── Keypad (12 keys via TCA9535 IO expander at I²C 0x20) ───
  # Keys 0-4 → select LVGL tabs directly (CDC, NET, PWR, TRPC, HACK)
  - platform: gpio
    id: key_0
    name: "Key 0"
    pin:
      xl9535: keypad_expander
      number: 0
      mode: INPUT
      inverted: true
    on_press:
      then:
        - lambda: "id(active_tab_idx) = 0;"
        - lvgl.tabview.select:
            id: tabs
            index: 0
  - platform: gpio
    id: key_1
    name: "Key 1"
    pin:
      xl9535: keypad_expander
      number: 1
      mode: INPUT
      inverted: true
    on_press:
      then:
        - lambda: "id(active_tab_idx) = 1;"
        - lvgl.tabview.select:
            id: tabs
            index: 1
  - platform: gpio
    id: key_2
    name: "Key 2"
    pin:
      xl9535: keypad_expander
      number: 2
      mode: INPUT
      inverted: true
    on_press:
      then:
        - lambda: "id(active_tab_idx) = 2;"
        - lvgl.tabview.select:
            id: tabs
            index: 2
  - platform: gpio
    id: key_3
    name: "Key 3"
    pin:
      xl9535: keypad_expander
      number: 3
      mode: INPUT
      inverted: true
    on_press:
      then:
        - lambda: "id(active_tab_idx) = 3;"
        - lvgl.tabview.select:
            id: tabs
            index: 3
  - platform: gpio
    id: key_4
    name: "Key 4"
    pin:
      xl9535: keypad_expander
      number: 4
      mode: INPUT
      inverted: true
    on_press:
      then:
        - lambda: "id(active_tab_idx) = 4;"
        - lvgl.tabview.select:
            id: tabs
            index: 4
  - platform: gpio
    id: key_5
    name: "Key 5"
    pin:
      xl9535: keypad_expander
      number: 5
      mode: INPUT
      inverted: true
  - platform: gpio
    id: key_6
    name: "Key 6"
    pin:
      xl9535: keypad_expander
      number: 6
      mode: INPUT
      inverted: true
  - platform: gpio
    id: key_7
    name: "Key 7"
    pin:
      xl9535: keypad_expander
      number: 7
      mode: INPUT
      inverted: true
  - platform: gpio
    id: key_8
    name: "Key 8"
    pin:
      xl9535: keypad_expander
      number: 10
      mode: INPUT
      inverted: true
  - platform: gpio
    id: key_9
    name: "Key 9"
    pin:
      xl9535: keypad_expander
      number: 11
      mode: INPUT
      inverted: true
  # YES → cycle to next tab
  - platform: gpio
    id: key_yes
    name: "Key YES"
    pin:
      xl9535: keypad_expander
      number: 12
      mode: INPUT
      inverted: true
    on_press:
      then:
        - lambda: "id(active_tab_idx) = (id(active_tab_idx) + 1) % 5;"
        - if:
            condition:
              lambda: "return id(active_tab_idx) == 0;"
            then:
              - lvgl.tabview.select: {id: tabs, index: 0}
        - if:
            condition:
              lambda: "return id(active_tab_idx) == 1;"
            then:
              - lvgl.tabview.select: {id: tabs, index: 1}
        - if:
            condition:
              lambda: "return id(active_tab_idx) == 2;"
            then:
              - lvgl.tabview.select: {id: tabs, index: 2}
        - if:
            condition:
              lambda: "return id(active_tab_idx) == 3;"
            then:
              - lvgl.tabview.select: {id: tabs, index: 3}
        - if:
            condition:
              lambda: "return id(active_tab_idx) == 4;"
            then:
              - lvgl.tabview.select: {id: tabs, index: 4}
  # NO → cycle to previous tab
  - platform: gpio
    id: key_no
    name: "Key NO"
    pin:
      xl9535: keypad_expander
      number: 13
      mode: INPUT
      inverted: true
    on_press:
      then:
        - lambda: "id(active_tab_idx) = (id(active_tab_idx) - 1 + 5) % 5;"
        - if:
            condition:
              lambda: "return id(active_tab_idx) == 0;"
            then:
              - lvgl.tabview.select: {id: tabs, index: 0}
        - if:
            condition:
              lambda: "return id(active_tab_idx) == 1;"
            then:
              - lvgl.tabview.select: {id: tabs, index: 1}
        - if:
            condition:
              lambda: "return id(active_tab_idx) == 2;"
            then:
              - lvgl.tabview.select: {id: tabs, index: 2}
        - if:
            condition:
              lambda: "return id(active_tab_idx) == 3;"
            then:
              - lvgl.tabview.select: {id: tabs, index: 3}
        - if:
            condition:
              lambda: "return id(active_tab_idx) == 4;"
            then:
              - lvgl.tabview.select: {id: tabs, index: 4}

  # ── Grove motion sensor (GPIO2, PIR) ────────────────────────
  - platform: gpio
    id: pir_motion
    name: "Motion"
    device_class: motion
    pin:
      number: GPIO2
      mode: INPUT
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms

  # ── Flash / BOOT button (GPIO0) ────────────────────────────
  - platform: gpio
    id: flash_button
    pin:
      number: GPIO0
      inverted: true
      mode: INPUT_PULLUP
    name: "Flash Button"
