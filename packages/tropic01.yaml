# ── TROPIC01 Secure Element ────────────────────────────────────
# Custom component — see components/tropic01/. Uses ESP-IDF SPI directly
# (shared bus with e-paper display, declared as spi dependency for validation).
tropic01:
  id: tr01
  cs_pin: 10
  data_rate: 10000000        # 10 MHz SPI clock

# Sub-platform sensors — each maps to a Tropic01Data field published by the
# component on every update cycle.
text_sensor:
  - platform: tropic01
    tropic01_id: tr01
    chip_mode:
      id: tr01_chip_mode
      name: "TROPIC01 Chip Mode"          # current operating mode of the secure element
    fw_version_riscv:
      id: tr01_fw_rv
      name: "TROPIC01 RISC-V Version"     # firmware version on the RISC-V core
    fw_version_spect:
      id: tr01_fw_spect
      name: "TROPIC01 SPECT Version"      # security coprocessor firmware version
    chip_serial:
      id: tr01_serial
      name: "TROPIC01 Serial"             # unique factory-programmed chip serial

binary_sensor:
  - platform: tropic01
    tropic01_id: tr01
    alarm:
      id: tr01_alarm
      name: "TROPIC01 Tamper Alarm"       # true if chip detects physical tampering
    maintenance:
      id: tr01_maintenance
      name: "TROPIC01 Maintenance Mode"    # true if chip is in bootloader (no App FW)
